name: ✨ Feature request
description: Suggest a new rule, provider, reporter, or capability.
labels: [enhancement]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New detection rule (Stage 1)
        - New model provider (Stage 2)
        - New reporter / output format
        - Sanitizer / dynamic verification (Stage 3)
        - CLI / library API
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
